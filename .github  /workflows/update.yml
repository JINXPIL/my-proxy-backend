name: VPN Auto Updater

on:
  schedule:
    - cron: '0 */6 * * *'  # Запуск каждые 6 часов
  workflow_dispatch:       # Позволяет запускать процесс кнопкой вручную

jobs:
  update-proxies:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Даем права на запись (сохранение новых ключей)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run Main Aggregator
        run: python scripts/main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/githubmirror/
          git add data/stats.json
          git commit -m "Автообновление базы серверов" || echo "Нет новых изменений"
          git push
